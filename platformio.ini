; ============================================================================
; PlatformIO Project Configuration — Multidisplay Rebase26
; ============================================================================
;
; Multidisplay is an open-source automotive datalogger, boost controller,
; and display for turbocharged vehicles.
;
; This file configures PlatformIO to build the firmware for two targets:
;   1. [env:mega2560]  — Arduino Mega 2560 (ATmega2560) — primary / current HW
;   2. [env:esp32]     — ESP32-DevKitC (future hardware revision)
;
; To build in VS Code:
;   1. Install the PlatformIO IDE extension
;   2. Open this project folder
;   3. Select the target environment from the bottom status bar
;   4. Click Build (checkmark icon) or Upload (arrow icon)
;
; To build from CLI:
;   pio run -e mega2560        Build for Mega 2560
;   pio run -e mega2560 -t upload   Build & upload to Mega 2560
;   pio run -e esp32           Build for ESP32
;   pio run                    Build all environments
;
; ============================================================================

; ---------------------------------------------------------------------------
; Global project settings
; ---------------------------------------------------------------------------
[platformio]
; The project keeps all source and header files in the repository root
; (flat layout) rather than the default src/ + include/ directories.
; This preserves the original file organisation from the legacy IDE.
src_dir = .

; Default build target — the ATmega2560 (current production hardware).
default_envs = mega2560

; ---------------------------------------------------------------------------
; Shared settings inherited by every [env:*] section
; ---------------------------------------------------------------------------
[env]
framework = arduino

; Explicitly list which source files to compile.
; This prevents PlatformIO from trying to compile the library sources
; under lib/ a second time (they are handled by the Library Dependency Finder).
build_src_filter =
  +<main.cpp>
  +<MultidisplayController.cpp>
  +<SensorData.cpp>
  +<RPMBoostController.cpp>
  +<OledController.cpp>
  +<Map16x1.cpp>
  +<Map32x1.cpp>
  +<util.cpp>
  +<LCD/LCDController.cpp>

; Add the LCD subdirectory to the include search path so that
; #include "LCDController.h" resolves correctly from source files
; that don't use the "LCD/" prefix.
build_flags =
  -ILCD

; Monitor serial output at 115200 baud (default Multidisplay baud rate).
monitor_speed = 115200

; ---------------------------------------------------------------------------
; Environment: Arduino Mega 2560 (ATmega2560) — primary target
; ---------------------------------------------------------------------------
[env:mega2560]
platform = atmelavr
board = megaatmega2560

; Upload via USB-serial (auto-detected).
; Uncomment and set the port manually if auto-detection fails:
; upload_port = /dev/ttyACM0      ; Linux
; upload_port = /dev/tty.usbmodem*  ; macOS
; upload_port = COM3               ; Windows

; ---------------------------------------------------------------------------
; Environment: ESP32-DevKitC — future hardware revision
; ---------------------------------------------------------------------------
[env:esp32]
platform = espressif32
board = esp32dev

; ESP32 partition table — default 4 MB flash with OTA support.
; The EEPROM emulation library needs a small NVS partition (included by default).
board_build.partitions = default.csv

; Upload via USB-serial (auto-detected).
; upload_port = /dev/ttyUSB0       ; Linux
; upload_port = /dev/tty.SLAB*     ; macOS (CP2102)
; upload_port = COM4               ; Windows
