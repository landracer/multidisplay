; PlatformIO Configuration for MultiDisplay
; ATmega2560 (Seeeduino Mega) with Arduino framework
;
; Copyright 2009-13 Stephan Martin, Dominik Gummel
; Contributors 2025-26: uknowmelast, Axiom (rAtTrax project)
; Licensed under GPL v3
;
; Build:   pio run
; Upload:  pio run -t upload
; Monitor: pio device monitor -b 115200

[platformio]
src_dir = .
include_dir = .

[env:mega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino
board_build.mcu = atmega2560
board_build.f_cpu = 16000000L

; Source filter — include all .cpp/.c in root and subdirectories
build_src_filter =
    +<*.cpp>
    +<*.c>
    +<LCD/*.cpp>
    +<libs/*.cpp>
    +<libs/*.c>
    +<obd2_implementation/*.cpp>

; Additional include directories
build_flags =
    -Ilibs
    -ILCD
    -Wno-narrowing
    -Os

; Serial monitor
monitor_speed = 115200

; Upload settings (avrdude over USB)
upload_protocol = wiring
upload_speed = 115200
; Override port if needed:
; upload_port = /dev/ttyUSB0

; Disable the default library dependency finder for bundled libs
; (Wire, EEPROM etc. are in libs/ not the Arduino library manager)
lib_deps =
lib_ldf_mode = off
